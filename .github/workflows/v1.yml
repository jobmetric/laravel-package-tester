name: Tester v1

on:
  workflow_call:
    inputs:
      php_version:
        description: PHP version.
        required: false
        default: "8.2"
        type: string
      laravel_version:
        description: Laravel version for sandbox app.
        required: false
        default: "^9.0|^10.0|^11.0"
        type: string
      date_format:
        description: "Date format"
        required: false
        type: string
      calendar_type:
        description: "Calendar type"
        required: false
        type: string
        default: "jalali"
      timezone:
        description: "Timezone"
        required: false
        type: string
        default: "UTC"
      package_name:
        description: "Package name to test"
        required: true
        type: string
    secrets:
      bot_token:
        required: true
      chat_id:
        required: true

jobs:
  tests:
    name: PR Package Test (PHP ${{ inputs.php_version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      APP_DIR: .ci/laravel-app
      PACKAGE_DIR: package-under-test
      TESTER_PACKAGE: jobmetric/laravel-package-tester
      COMPOSER_AUDIT: false
    steps:
      - name: 🟡 Starting
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        with:
          header: package-tests
          message: |
            ## 🧪 Package Test Progress
            [░░░░░░░░░░] 0% - Starting tests...
            **Package:** `${{ inputs.package_name }}`

      - name: Checkout PR package repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.PACKAGE_DIR }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php_version: ${{ inputs.php_version }}
          tools: composer:v2
          coverage: none
          extensions: ${{ inputs.date_format != '' && inputs.date_format != null && 'intl' || '' }}

      - name: Create sandbox and install packages
        env:
          COMPOSER_AUDIT: false
        run: |
          set -euo pipefail

          rm -rf "$APP_DIR"
          composer create-project laravel/laravel "$APP_DIR" "${{ inputs.laravel_version }}" --no-interaction --prefer-dist --no-install --no-scripts
          cd "$APP_DIR"

          composer config --no-interaction minimum-stability dev
          composer config --no-interaction prefer-stable true
          composer config --no-interaction allow-plugins.jobmetric/package-tester-composer-plugin true
          composer config --json --no-interaction repositories.package_under_test "{\"type\":\"path\",\"url\":\"${GITHUB_WORKSPACE}/${PACKAGE_DIR}\",\"options\":{\"symlink\":false},\"canonical\":false}"
          
          LARAVEL_VERSION_REQ=$(grep "laravel/framework" composer.json | grep -oE '[0-9]+\.[0-9]+' | head -1)
          LARAVEL_MAJOR=$(echo "$LARAVEL_VERSION_REQ" | cut -d. -f1)

          if [ "$LARAVEL_MAJOR" -ge 12 ]; then
            TESTBENCH_VERSION="^10.0"
          elif [ "$LARAVEL_MAJOR" -ge 11 ]; then
            TESTBENCH_VERSION="^9.0"
          elif [ "$LARAVEL_MAJOR" -ge 10 ]; then
            TESTBENCH_VERSION="^8.0"
          else
            TESTBENCH_VERSION="^7.0"
          fi

          echo "Detected Laravel Major: $LARAVEL_MAJOR, installing Testbench: $TESTBENCH_VERSION"

          composer require --dev --no-interaction --no-update "orchestra/testbench:${TESTBENCH_VERSION}"
          
          if [ "${{ inputs.package_name }}" != "jobmetric/laravel-package-tester" ]; then
            composer require --no-interaction --no-update "$TESTER_PACKAGE:dev-master"
          fi
          
          if [ -n "${{ inputs.date_format }}" ] && [ "${{ inputs.date_format }}" != "" ]; then
            composer require --no-interaction --no-update "jobmetric/multi-calendar"
          fi

          composer require --dev --no-interaction --no-update "${{ inputs.package_name }}:@dev"

          composer update --no-interaction --prefer-dist -W
          
          composer dump-autoload --no-interaction -o

      - name: Prepare Laravel application
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail

          php artisan config:clear || true
          php artisan cache:clear || true

          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=array/' .env || echo "DB_CONNECTION=array" >> .env
          sed -i '/^DB_/d' .env || true

          php artisan key:generate --force
          
          composer dump-autoload --no-interaction -o
          php artisan package:discover --ansi || true
          composer dump-autoload --no-interaction -o

      - name: 🟣 Testing
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        with:
          header: package-tests
          message: |
            ## 🧪 Package Test Progress
            [██████░░░░] 60% - Running tests...

      - name: Run package tests with laravel-package-tester
        id: package_tests
        continue-on-error: true
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          
          if php artisan list | grep -q "test-run"; then
            php artisan test-run "${{ inputs.package_name }}" --detailed
          elif php artisan list | grep -q "package-tester:test-run"; then
            php artisan package-tester:test-run "${{ inputs.package_name }}" --detailed
          elif php artisan list | grep -q "package-tester:run"; then
            php artisan package-tester:run "${{ inputs.package_name }}" --detailed
          else
            echo "ERROR: Command test-run not found"
            php artisan list | grep -i test || true
            exit 1
          fi

      - name: ✅ Final Result
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: package-tests
          message: |
            ## 🧪 Package Test Results
            [██████████] 100% - Done!
            
            ### ${{ steps.package_tests.outcome == 'success' && '✅ All Tests Passed!' || '❌ Tests Failed!' }}
            
            **Run URL:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram
        if: always()
        uses: jobmetric/github-notify/.github/action@master
        with:
          bot_token: ${{ secrets.bot_token }}
          chat_id: ${{ secrets.chat_id }}
          test_outcome: ${{ steps.package_tests.outcome }}
          package_name: ${{ inputs.package_name }}
          repository: ${{ github.repository }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          event_name: ${{ github.event_name }}
          pr_number: ${{ github.event.pull_request.number }}
          date_format: ${{ inputs.date_format }}
          calendar_type: ${{ inputs.calendar_type }}
          timezone: ${{ inputs.timezone }}
          app_dir: ${{ env.APP_DIR }}

      - name: Fail workflow if tests failed
        if: ${{ steps.package_tests.outcome == 'failure' }}
        run: exit 1